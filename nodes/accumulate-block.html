<script type="text/html" data-template-name="accumulate-block">
    <div class="form-row">
        <label for="node-input-name" title="Display name shown on the canvas"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-inputProperty" title="Message property to read input from"><i class="fa fa-folder-open"></i> Input Property</label>
        <input type="text" id="node-input-inputProperty" placeholder="payload">
    </div>
    <div class="form-row">
        <label for="node-input-mode" title="Select accumulation mode"><i class="fa fa-cog"></i> Mode</label>
        <select id="node-input-mode">
            <option value="true">Accumulate True</option>
            <option value="false">Accumulate False</option>
            <option value="flows">Accumulate Flows</option>
        </select>
    </div>
    <div class="form-row">
        <label title="Runtime action for the deployed node"><i class="fa fa-bolt"></i> Actions</label>
        <button type="button" id="node-input-reset-count" class="red-ui-button" style="width: auto;">Reset Count</button>
        <span style="margin-left: 8px; color: #666;">Applies to the deployed node instance.</span>
    </div>
</script>

<script type="text/javascript">
    function resetAccumulateCount(nodeId) {
        return $.ajax({
            url: "accumulate-block/" + nodeId + "/reset-count",
            type: "POST"
        });
    }

    RED.nodes.registerType("accumulate-block", {
        category: "bldgblocks control",
        color: "#301934",
        defaults: {
            name: { value: "" },
            inputProperty: { value: "payload" },
            mode: { value: "true", required: true }
        },
        inputs: 1,
        outputs: 1,
        inputLabels: ["input"],
        outputLabels: ["count"],
        icon: "font-awesome/fa-sort-numeric-asc",
        paletteLabel: "accumulate",
        label: function() {
            if (this.name) return this.name;
            const modeLabels = {
                "true": "true accumulate",
                "false": "false accumulate", 
                "flows": "flows accumulate"
            };
            return modeLabels[this.mode] || "accumulate";
        },
        oneditprepare: function() {
            const node = this;
            const $resetButton = $("#node-input-reset-count");

            $resetButton.on("click", function() {
                $resetButton.prop("disabled", true);
                resetAccumulateCount(node.id)
                    .done(function() {
                        RED.notify("Count reset", "success");
                    })
                    .fail(function(xhr) {
                        const error = xhr.responseJSON && xhr.responseJSON.error;
                        RED.notify(error || "Unable to reset count", "error");
                    })
                    .always(function() {
                        $resetButton.prop("disabled", false);
                    });
            });
        }
    });
</script>

<script type="text/markdown" data-help-name="accumulate-block">
Counts consecutive inputs from a configured property based on the selected mode, resetting on specific conditions.

### Inputs
: input-property (boolean, for true/false modes) : Input value to evaluate, read from the configured Input Property.
: context (string) : Configuration commands (`"reset"` to clear count).

### Outputs
: payload (number) : Current count based on mode.

### Properties
: name (string) : Display name in editor.
: inputProperty (string) : Message property to read input from (default: `payload`). Supports nested properties (e.g., `data.value`).
: mode (string) : Accumulation mode (`"true"`, `"false"`, `"flows"`).

### Details
Counts inputs according to the selected mode, reading from the configured **Input Property** (default: `msg.payload`):
- **Accumulate True** counts consecutive `true` values (resets on `false` or explicit reset)
- **Accumulate False** counts consecutive `false` values (resets on `true` or explicit reset)
- **Accumulate Flows** counts all valid input messages (resets only on explicit reset)

Reset via `msg.context = "reset"` with `msg.payload = true`.
The **Reset Count** action in the editor resets the deployed node count to zero without redeploying.

Used to track sustained events or message frequency.

### Status
- Green (dot): Configuration
- Blue (dot): Output sent
- Red (ring): Errors
- Yellow (ring): Unknown context

### References
- [Node-RED Documentation](https://nodered.org/docs/)
- [GitHub Repository](https://github.com/BldgBlocks/node-red-contrib-buildingblocks-control.git)
</script>
