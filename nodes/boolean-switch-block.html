<script type="text/javascript">

            falseProperty: { value: "" }
        },
        inputs: 1,
        outputs: 3,
        inputLabels: ["control"],
        outputLabels: ["outTrue", "outFalse", "outControl"],

<!-- Help Section -->
<script type="text/markdown" data-help-name="boolean-switch-block">
A boolean gate that routes messages based on a `true`/`false` switch value.

### Inputs
: map mode (default) : The switch, true, and false properties identify independent incoming branches.
: context mode : `context` identifies the control command or virtual input and `payload` carries its value.

#### Map mode
- **Switch property** — Boolean value that sets the active path. Defaults to `switch` (`msg.switch`). A switch message updates state but is not forwarded.
- **True property** — Required property for forwarding on `outTrue`. Defaults to `payload` (`msg.payload`).
- **False property** — Optional property for forwarding on `outFalse`. Leave empty to use the false state as a dead end.

Switch, true, and false messages may come from separate sources. The node retains the latest switch state but never retains or emits a data value when that state changes. A true/false-path message does not need to include the switch property; it is forwarded only when it has the currently active path property.

#### Context mode

#### Contexts
- **`"in"`** — Routes `msg` to `outTrue` when state is `true`, or `outFalse` when state is `false`. Always flows through.
- **`"inTrue"`** — Passes `msg` to `outTrue` only when state is `true`. Blocked with warning when `false`.
- **`"inFalse"`** — Passes `msg` to `outFalse` only when state is `false`. Blocked with warning when `true`.
- **`"toggle"`** — Flips the switch state and emits new state on `outControl`.
- **`"switch"`** — Sets the switch state to `!!msg.payload` and emits on `outControl`.

### Outputs
: outTrue (msg) : Receives the original `msg` when the true path is active.
: outFalse (msg) : Receives the original `msg` when the false path is active.
: outControl (msg) : Emits `{ payload: <boolean> }` on `"toggle"` or `"switch"` only.

### Details
This node acts as a boolean gate/router. In map mode, send `{ switch: true }` to open the true path, then a polling message such as `{ payload: ... }` passes through `outTrue`. Send `{ switch: false }` to close that path without emitting a data message.

In context mode, use `"in"` to auto-route messages to the correct output based on state. Use `"inTrue"`/`"inFalse"` for conditional gating.

Context-mode state can be controlled with `"toggle"` (flip) or `"switch"` (set explicitly via payload).
The `outControl` port fires only on state commands, not on routed data messages.

### Status
- **Green (dot)**: Message routed successfully
- **Blue (dot)**: Context-mode state changed (`toggle` / `switch`)
- **Blue (ring)**: Message gated or context-mode state unchanged
- **Yellow (ring)**: Unknown context
- **Red (ring)**: Missing context or invalid message

### References
- [Node-RED Documentation](https://nodered.org/docs/)
- [GitHub Repository](https://github.com/BldgBlocks/node-red-contrib-buildingblocks-control.git)
