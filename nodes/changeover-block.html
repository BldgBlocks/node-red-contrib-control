<script type="text/html" data-template-name="changeover-block">
    <div class="form-row">
        <label for="node-input-name" title="Display name shown on the canvas"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-inputProperty" title="Message property to read temperature input from"><i class="fa fa-folder-open"></i> Input Property</label>
        <input type="text" id="node-input-inputProperty" placeholder="payload">
    </div>
    <div class="form-row">
        <label for="node-input-algorithm" title="Control algorithm type"><i class="fa fa-cog"></i> Algorithm</label>
        <input type="text" id="node-input-algorithm" class="node-input-typed" placeholder="single">
        <input type="hidden" id="node-input-algorithmType">
    </div>
    <div class="form-row single-only">
        <label for="node-input-setpoint" title="Target temperature setpoint (number from num, msg, flow, or global)"><i class="fa fa-thermometer-half"></i> Setpoint</label>
        <input type="text" id="node-input-setpoint" class="node-input-typed" placeholder="70">
        <input type="hidden" id="node-input-setpointType">
    </div>
    <div class="form-row single-only">
        <label for="node-input-deadband" title="Temperature range for no action (positive number)"><i class="fa fa-arrows-v"></i> Deadband</label>
        <input type="text" id="node-input-deadband" placeholder="2">
        <input type="hidden" id="node-input-deadbandType">
    </div>
    <div class="form-row split-only" style="display: none;">
        <div id="deadband-warning" style="color: red; display: none; margin-top: 5px;">
            Invalid
        </div>
    </div>
    <div class="form-row split-only" style="display: none;">
        <label for="node-input-heatingSetpoint" title="Heating setpoint for split algorithm (number from num, msg, flow, or global)"><i class="fa fa-thermometer-empty"></i> Heating Setpoint</label>
        <input type="text" id="node-input-heatingSetpoint" class="node-input-typed" placeholder="68">
        <input type="hidden" id="node-input-heatingSetpointType">
    </div>
    <div class="form-row split-only" style="display: none;">
        <label for="node-input-coolingSetpoint" title="Cooling setpoint for split algorithm (number from num, msg, flow, or global)"><i class="fa fa-thermometer-full"></i> Cooling Setpoint</label>
        <input type="text" id="node-input-coolingSetpoint" class="node-input-typed" placeholder="74">
        <input type="hidden" id="node-input-coolingSetpointType">
    </div>
    <div class="form-row split-only" style="display: none;">
        <div id="split-setpoint-warning" style="color: red; display: none; margin-top: 5px;">
            Cooling setpoint must be greater than heating setpoint
        </div>
    </div>
    <div class="form-row split-only">
        <label for="node-input-extent" title="Extra buffer mode switching thresholds (non-negative number)"><i class="fa fa-tachometer"></i> Extent</label>
        <input type="text" id="node-input-extent" placeholder="1">
        <input type="hidden" id="node-input-extentType">
    </div>
    <div class="form-row split-only" style="display: none;">
        <div id="extent-warning" style="color: red; display: none; margin-top: 5px;">
            Invalid
        </div>
    </div>

    <div class="form-row specified-only" style="display: none;">
        <label for="node-input-coolingOn" title="Temperature to turn cooling on (number from num, msg, flow, or global)"><i class="fa fa-snowflake-o"></i> Cooling On</label>
        <input type="text" id="node-input-coolingOn" placeholder="74">
        <input type="hidden" id="node-input-coolingOnType">
    </div>
    <div class="form-row specified-only" style="display: none;">
        <label for="node-input-heatingOn" title="Temperature to turn heating on (number from num, msg, flow, or global)"><i class="fa fa-fire"></i> Heating On</label>
        <input type="text" id="node-input-heatingOn" placeholder="66">
        <input type="hidden" id="node-input-heatingOnType">
    </div>

    <div class="form-row">
        <label for="node-input-swapTime" title="Minimum time before mode change (seconds, minimum 60, from num, msg, flow, or global)"><i class="fa fa-clock-o"></i> Swap Time</label>
        <input type="text" id="node-input-swapTime" class="node-input-typed" placeholder="300">
        <input type="hidden" id="node-input-swapTimeType">
    </div>
    <div class="form-row">
        <label for="node-input-minTempSetpoint" title="Minimum allowable setpoint"><i class="fa fa-thermometer-empty"></i> Min Setpoint</label>
        <input type="text" id="node-input-minTempSetpoint" placeholder="55">
        <input type="hidden" id="node-input-minTempSetpointType">
    </div>
    <div class="form-row">
        <label for="node-input-maxTempSetpoint" title="Maximum allowable setpoint"><i class="fa fa-thermometer-full"></i> Max Setpoint</label>
        <input type="text" id="node-input-maxTempSetpoint" placeholder="90">
        <input type="hidden" id="node-input-maxTempSetpointType">
    </div>
    <div class="form-row">
        <label for="node-input-initWindow" title="Initialization window to collect inputs before mode selection (seconds, non-negative number)"><i class="fa fa-hourglass-start"></i> Init Window</label>
        <input type="text" id="node-input-initWindow" placeholder="10">
    </div>
    <div class="form-row split-only" style="display: none;">
        <div id="initWindow-warning" style="color: red; display: none; margin-top: 5px;">
            Invalid
        </div>
    </div>
    <div class="form-row">
        <label for="node-input-operationMode" title="Operation mode"><i class="fa fa-cogs"></i> Operation Mode</label>
        <input type="text" id="node-input-operationMode" placeholder="auto">
        <input type="hidden" id="node-input-operationModeType">
    </div>
</script>

<script type="text/javascript">
    RED.nodes.registerType("changeover-block", {
        category: "bldgblocks control",
        color: "#301934",
        defaults: {
            name: { value: "" },
            inputProperty: { value: "payload" },
            algorithm: { value: "single" },
            algorithmType: { value: "dropdown" },
            setpoint: { value: "70" },
            setpointType: { value: "num" },
            deadband: { value: "2" },
            heatingSetpoint: { value: "68" },
            heatingSetpointType: { value: "num" },
            coolingSetpoint: { value: "74" },
            coolingSetpointType: { value: "num" },
            coolingOn: { value: "74" },
            coolingOnType: { value: "num" },
            heatingOn: { value: "66" },
            heatingOnType: { value: "num" },
            extent: { value: "1" },
            swapTime: { value: "300" },
            swapTimeType: { value: "num" },
            minTempSetpoint: { value: "55" },
            minTempSetpointType: { value: "num"},
            maxTempSetpoint: { value: "90" },
            maxTempSetpointType: { value: "num"},
            initWindow: { value: "10" },
            operationMode: { value: "auto" },
            operationModeType: { value: "dropdown" },
        },
        inputs: 1,
        outputs: 1,
        inputLabels: ["temperature"],
        outputLabels: ["isHeating", "status"],
        icon: "font-awesome/fa-retweet",
        paletteLabel: "changeover",
        label: function() {
            return this.name || "changeover";
        },
        oneditprepare: function() {
            const node = this;
            const $algorithm = $("#node-input-algorithm");
            const $singleFields = $(".single-only");
            const $splitFields = $(".split-only");
            const $specifiedFields = $(".specified-only");

            try {
                // Initialize typed inputs
                
                $("#node-input-operationMode").typedInput({
                    default: "dropdown",
                    types: [{
                        value: "dropdown",
                        options: [
                            { value: "auto", label: "Auto"},
                            { value: "heat", label: "Heat"},
                            { value: "cool", label: "Cool"},
                        ]
                    }, "msg", "flow", "global"],
                    typeField: "#node-input-operationModeType"
                }).typedInput("type", node.operationModeType).typedInput("value", node.operationMode);
                
                $("#node-input-algorithm").typedInput({
                    default: "dropdown",
                    types: [{
                        value: "dropdown",
                        options: [
                            { value: "single", label: "Single"},
                            { value: "split", label: "Split"},
                            { value: "specified", label: "Specified"},
                        ]
                    }, "msg", "flow", "global"],
                    typeField: "#node-input-algorithmType"
                }).typedInput("type", node.algorithmType).typedInput("value", node.algorithm);

                $("#node-input-setpoint").typedInput({
                    default: "num",
                    types: ["num", "msg", "flow", "global"],
                    typeField: "#node-input-setpointType"
                }).typedInput("type", node.setpointType || "num").typedInput("value", node.setpoint);

                $("#node-input-heatingSetpoint").typedInput({
                    default: "num",
                    types: ["num", "msg", "flow", "global"],
                    typeField: "#node-input-heatingSetpointType"
                }).typedInput("type", node.heatingSetpointType || "num").typedInput("value", node.heatingSetpoint);

                $("#node-input-coolingSetpoint").typedInput({
                    default: "num",
                    types: ["num", "msg", "flow", "global"],
                    typeField: "#node-input-coolingSetpointType"
                }).typedInput("type", node.coolingSetpointType || "num").typedInput("value", node.coolingSetpoint);

                $("#node-input-heatingOn").typedInput({
                    default: "num",
                    types: ["num", "msg", "flow", "global"],
                    typeField: "#node-input-heatingOnType"
                }).typedInput("type", node.heatingOnType || "num").typedInput("value", node.heatingOn);

                $("#node-input-coolingOn").typedInput({
                    default: "num",
                    types: ["num", "msg", "flow", "global"],
                    typeField: "#node-input-coolingOnType"
                }).typedInput("type", node.coolingOnType || "num").typedInput("value", node.coolingOn);

                $("#node-input-swapTime").typedInput({
                    default: "num",
                    types: ["num", "msg", "flow", "global"],
                    typeField: "#node-input-swapTimeType"
                }).typedInput("type", node.swapTimeType || "num").typedInput("value", node.swapTime);

                $("#node-input-deadband").typedInput({
                    default: "num",
                    types: ["num", "msg", "flow", "global"],
                    typeField: "#node-input-deadbandType"
                }).typedInput("type", node.deadbandType || "num").typedInput("value", node.deadband);

                $("#node-input-extent").typedInput({
                    default: "num",
                    types: ["num", "msg", "flow", "global"],
                    typeField: "#node-input-extentType"
                }).typedInput("type", node.extentType || "num").typedInput("value", node.extent);

                $("#node-input-minTempSetpoint").typedInput({
                    default: "num",
                    types: ["num", "msg", "flow", "global"],
                    typeField: "#node-input-minTempSetpointType"
                }).typedInput("type", node.minTempSetpointType || "num").typedInput("value", node.minTempSetpoint);

                $("#node-input-maxTempSetpoint").typedInput({
                    default: "num",
                    types: ["num", "msg", "flow", "global"],
                    typeField: "#node-input-maxTempSetpointType"
                }).typedInput("type", node.maxTempSetpointType || "num").typedInput("value", node.maxTempSetpoint);

                // Toggle fields based on algorithm
                function toggleFields() {
                    if ($algorithm.val() === "single") {
                        $singleFields.show();
                        $splitFields.hide();
                        $specifiedFields.hide();
                    } else if ($algorithm.val() === "split") {
                        $singleFields.hide();
                        $splitFields.show();
                        $specifiedFields.hide();
                    } else if ($algorithm.val() === "specified") {
                        $singleFields.hide();
                        $splitFields.hide();
                        $specifiedFields.show();
                    } else {
                        $algorithm.val("single");
                        $singleFields.show();
                        $splitFields.hide();
                        $specifiedFields.hide();
                    }
                }

                $algorithm.on("change", toggleFields);
                toggleFields();
                
            } catch (err) {
                console.error("Error in oneditprepare:", err);
            }
        }
    });
</script>

<script type="text/markdown" data-help-name="changeover-block">
Manages HVAC mode switching between heating and cooling based on temperature input and setpoint configuration.

### Inputs
: payload (number) : Temperature reading for mode evaluation. The property name is configurable via **Input Property**.

### Outputs
: payload (boolean) : `true` for heating, `false` for cooling.
: context (string) : Always `"isHeating"`.
: status (object) : `{ mode, operationMode, isHeating, heatingSetpoint, coolingSetpoint, temperature }`.

### Operation Modes
All parameters support typed inputs (static value, `msg`, `flow`, or `global`).

- **Auto** — switches between heating and cooling based on temperature vs. algorithm thresholds. A mode change requires the condition to persist for `swapTime` seconds (minimum 60s). A countdown is shown in the status (e.g., `pending: cooling in 120s`).
- **Heat** — locked to heating regardless of temperature.
- **Cool** — locked to cooling regardless of temperature.

### Algorithms

- **Single Setpoint** — one setpoint with a deadband.
  - Heating threshold: `setpoint - deadband / 2`
  - Cooling threshold: `setpoint + deadband / 2`
  - Example: `setpoint=70`, `deadband=2` → heat below 69, cool above 71.

- **Split Setpoint** — separate heating and cooling setpoints with an extent buffer.
  - Heating threshold: `heatingSetpoint - extent`
  - Cooling threshold: `coolingSetpoint + extent`
  - Example: `heatingSetpoint=68`, `coolingSetpoint=74`, `extent=1` → heat below 67, cool above 75.

- **Specified** — explicit trigger temperatures, no calculation.
  - Heating threshold: `heatingOn`
  - Cooling threshold: `coolingOn`

### Details
On startup, the node waits for `initWindow` seconds to let sensors stabilize before selecting the initial mode. During this period, temperature is cached but no output is sent.

The `extent` parameter (split algorithm) widens the switching thresholds beyond the setpoints. This prevents nuisance mode changes from overshoot and allows sharing the same setpoint values with other nodes while having independent switching buffers.

### Status
- **Yellow (ring)**: Initializing (startup window)
- **Blue (dot)**: Mode just changed
- **Blue (ring)**: Normal operation, no change
- **Red (ring)**: Error (invalid temperature, bad configuration)

### References
- [Node-RED Documentation](https://nodered.org/docs/)
- [GitHub Repository](https://github.com/BldgBlocks/node-red-contrib-buildingblocks-control.git)
</script>
