<script type="text/html" data-template-name="global-setter">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-path"><i class="fa fa-sitemap"></i> Global Path</label>
        <input type="text" id="node-input-path" placeholder="furnace/outputs/heat">
    </div>
    <div class="form-row">
        <label for="node-input-property"><i class="fa fa-ellipsis-h"></i> Input</label>
        <input type="text" id="node-input-property" style="width:70%;">
    </div>
    <div class="form-row">
        <label for="node-input-writePriority" title="Network priority slot (1-16) for this message. Network writes from external control systems use these slots."><i class="fa fa-sort-numeric-asc"></i> Network Priority</label>
        <input type="text" id="node-input-writePriority" placeholder="16">
        <input type="hidden" id="node-input-writePriorityType">
    </div>
    
    <hr>
    
    <div class="form-row">
        <label for="node-input-defaultValue" title="Manual default value to ensure one always exists. You may write to default through message configuration but may not set it to null."><i class="fa fa-undo"></i> Default</label>
        <input type="text" id="node-input-defaultValue" placeholder="e.g. 0 or false">
        <input type="hidden" id="node-input-defaultValueType">
    </div>

    <hr>

    <div class="form-row">
        <label>&nbsp;</label>
        <button type="button" id="node-btn-clear-priorities" class="editor-button" style="width: calc(70% - 3px);" title="Clear all 16 network priority slots on the live node (does not affect the default or fallback values)">
            <i class="fa fa-eraser"></i> Clear Network Priorities
        </button>
    </div>

    <div class="form-tips">
        <b>Note:</b> This node writes to the <b>Network Priority</b> slot (1-16), manually, by msg or flow. The actual value is determined by the highest active source: Priorities 1-16 → Fallback → Default.
    </div>
</script>

<script type="text/javascript">
    RED.nodes.registerType('global-setter', {
        category: "bldgblocks control",
        color: '#E2D96E',
        defaults: {
            name: { value: "" },
            path: { value: "", required: true },
            property: { value: "payload", required: true },
            defaultValue: { value: "", required: true },
            defaultValueType: { value: "num", required: true },
            writePriority: { value: "fallback", required: true },
            writePriorityType: { value: "dropdown" }
        },
        inputs: 1,
        outputs: 1,
        icon: "font-awesome/fa-align-right",
        label: function() {
            let lbl = this.name || this.path;
            if (lbl) {
                if (lbl && lbl.startsWith("#") && lbl.includes(":")) {
                    lbl = lbl.substring(lbl.indexOf(":") + 1);
                }
                return "set: " + lbl;
            }
            return this.name || "global set";
        },
        paletteLabel: "global set",
        oneditprepare: function() {
            const node = this;

            // These are read as strings not evaluated typed-inputs.
            $("#node-input-path").typedInput({ types: ['global'] });
            // getMessageProperty handles msg access on the incoming message at the specified path.
            $("#node-input-property").typedInput({ types: ['msg'] });
            // Default for the default value, meaning it should only be manually set. You can still pass default values through messages.
            $("#node-input-defaultValue").typedInput({
                default: "num",
                types: ["str", "num", "bool", "json"],
                typeField: "#node-input-defaultValueType"
            }).typedInput("type", node.defaultValueType || "num").typedInput("value", node.defaultValue);

            $("#node-input-writePriority").typedInput({
                default: "dropdown",
                types: [{
                    value: "dropdown",
                    options: [
                        { value: "1", label: "1 (Life Safety)"},
                        { value: "2", label: "2"},
                        { value: "3", label: "3"},
                        { value: "4", label: "4"},
                        { value: "5", label: "5"},
                        { value: "6", label: "6"},
                        { value: "7", label: "7"},
                        { value: "8", label: "8 (Manual Operator)"},
                        { value: "9", label: "9"},
                        { value: "10", label: "10"},
                        { value: "11", label: "11"},
                        { value: "12", label: "12"},
                        { value: "13", label: "13"},
                        { value: "14", label: "14"},
                        { value: "15", label: "15"},
                        { value: "16", label: "16 (Network Logic)"},
                        { value: "fallback", label: "fallback (Internal Logic)"},
                    ]
                }, "msg", "flow"],
                typeField: "#node-input-writePriorityType"
            }).typedInput("type", node.writePriorityType).typedInput("value", node.writePriority);

            // Clear Priorities button — calls the admin endpoint on the live runtime node
            $("#node-btn-clear-priorities").on("click", function() {
                const btn = $(this);
                if (!node.id) {
                    RED.notify("Node must be deployed before clearing priorities.", "warning");
                    return;
                }
                btn.prop("disabled", true).find("i").removeClass("fa-eraser").addClass("fa-spinner fa-spin");
                $.ajax({
                    url: "global-setter/" + node.id + "/clear-priorities",
                    type: "POST",
                    success: function(data) {
                        RED.notify("Priorities cleared — active: " + (data.activePriority || "default") + ":" + data.value, "success");
                    },
                    error: function(jqXHR) {
                        const errMsg = jqXHR.responseJSON ? jqXHR.responseJSON.error : "Unknown error";
                        RED.notify("Failed to clear priorities: " + errMsg, "error");
                    },
                    complete: function() {
                        btn.prop("disabled", false).find("i").removeClass("fa-spinner fa-spin").addClass("fa-eraser");
                    }
                });
            });
        }
    });
</script>

<!-- Help Section -->
<script type="text/markdown" data-help-name="global-setter">
Manage a global variable in a repeatable way.

### Inputs 
: payload (any) : Input payload is passed through unchanged.
: property (string) : The input property where the value is taken from.
: priority (number|string) : _Optional_. Overrides the configured Network Priority at runtime. Accepts `1`–`16`. For example, `msg.priority = 8` writes to priority slot 8.
: context (string) : _Optional_. Tagged-input routing. Accepts `"fallback"` (writes to the fallback slot) or `"priority1"`–`"priority16"` (writes to network priority slots), or `"reload"` (reload state without writing). When both `msg.priority` and `msg.context` are present, `msg.priority` takes precedence.
: units (string) : The units associated with the value, if any. Also supports nested units at `msg.<inputProperty>.units`.

### Outputs
: payload (any) : Original payload plus full state object (value, activePriority, all priority slots, fallback, metadata).

### Details
Global variables are meant to be retrieved in other places, this necessarily means managing the same string in multiple places. 

This node allows you to set a global variable in one place, and retrieve it elsewhere using the `global-getter` node while supporting rename and deletion.

When this node is deleted or the flow is redeployed, it will automatically remove (prune) the variable from the selected Context Store.

**Priority Hierarchy**: The active value is determined by the highest active source:
1. **Network Priorities (1-16)**: Used by external automation systems (e.g., BACnet, network service). Priority 16 is typical for network logic, 1 for life safety.
2. **Fallback**: A dynamic input slot updated via `{context: "fallback", payload: value}`. Useful for internal logic to write a secondary value (e.g., persistent context setpoints).
3. **Default**: A static configuration value. Always used as the ultimate fallback when all other sources are null/empty.

**Clear Network Priorities** button (in editor): Resets all 16 priority slots to `null` on the live running node. The fallback and default values are preserved. The active value recalculates based on the hierarchy. The node must be deployed first.

### Status
- Green (dot): Configuration update
- Blue (dot): State changed
- Blue (ring): State unchanged
- Red (ring): Error
- Yellow (ring): Warning

Status prefix: Empty = default active, `F` = fallback active, `P` = network priority active (e.g., `P3` = priority 3).

### References
- [Node-RED Documentation](https://nodered.org/docs/)  
- [GitHub Repository](https://github.com/BldgBlocks/node-red-contrib-buildingblocks-control.git)
</script>
