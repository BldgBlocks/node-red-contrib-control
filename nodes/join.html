<!-- Data Template -->
<script type="text/html" data-template-name="bldgblocks-join">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    
    <div class="form-row">
        <label for="node-input-count"><i class="fa fa-sort-numeric-asc"></i> Key Count</label>
        <input type="number" id="node-input-count" placeholder="4">
    </div>

    <div class="form-row">
        <label for="node-input-outputMode"><i class="fa fa-random"></i> Output</label>
        <select id="node-input-outputMode">
            <option value="immediate">On Input</option>
            <option value="trigger">On Trigger</option>
        </select>
    </div>

    <div class="form-row">
        <label for="node-input-excludedKeys"><i class="fa fa-ban"></i> Exclude</label>
        <input type="text" id="node-input-excludedKeys" placeholder="status, req, res">
        <div style="font-size: 0.8em; color: #888; margin-left: 105px;">Comma separated list of properties to ignore</div>
    </div>

    <div class="form-tips">
        <b>Note:</b> Counts unique leaf property paths, including nested ones.
        Example: <code>msg.payload.outdoor.temp</code> counts as one cached key path and is rebuilt as nested output.
    </div>
</script>

<!-- Registration & logic -->
<script type="text/javascript">
    RED.nodes.registerType('bldgblocks-join', {
        category: "bldgblocks control",
        color: '#301934',
        defaults: {
            name: { value: "" },
            count: { value: 4, required: true, validate: RED.validators.number() },
            outputMode: { value: "immediate", required: true, validate: function(v) { return ["immediate", "trigger"].includes(v); } },
            excludedKeys: { value: "status,context" } // Default to 'status' to maintain previous behavior
        },
        inputs: 1,
        outputs: 1,
        icon: "font-awesome/fa-compress",
        label: function() {
            return this.name || "join (" + this.count + ")";
        },
        paletteLabel: "join",
        oneditprepare: function() {
            $("#node-input-outputMode").attr("title",
                "On Input: emit whenever the cached key count reaches the configured threshold. " +
                "On Trigger: keep caching values, but only emit when a message arrives with msg.context = 'trigger'."
            );
        }
    });
</script>

<!-- Help Section -->
<script type="text/markdown" data-help-name="bldgblocks-join">
Joins multiple messages into a single message by accumulating unique properties. 
This differs from the standard Node-RED Join node by focusing on unique keys rather than message counts or parts
and combines to root level using property names.

### Inputs 
: all (any) : All unique properties from incoming messages.
: Key Count (number) : The number of unique leaf property paths required before the node emits the accumulated message.
: Output (string) : `On Input` emits as soon as the key count is met. `On Trigger` caches values and emits only when `msg.context = "trigger"` arrives.
: Exclude (string) : A comma-separated list of property paths to ignore (e.g., `status, payload.meta`).

### Outputs
: msg (any) : All unique properties combined at root level into a single message.

### Details
1. The node stores a running list of properties from every `msg` it receives.
2. It ignores properties starting with `_` (like `_msgid`).
3. Nested objects are flattened into unique leaf paths for counting and then rebuilt as nested output messages.
4. It ignores any properties or subtrees listed in the `Exclude` configuration.
5. In `On Input` mode, once the stored key count equals or exceeds `Key Count`, it emits the combined object on each subsequent update.
6. In `On Trigger` mode, it keeps caching the latest values and only emits when a message arrives with `msg.context = "trigger"`.

### Status
- Green (dot): Configuration update
- Blue (dot): State changed
- Blue (ring): State unchanged
- Red (ring): Error
- Yellow (ring): Warning

### References
- [Node-RED Documentation](https://nodered.org/docs/)  
- [GitHub Repository](https://github.com/BldgBlocks/node-red-contrib-buildingblocks-control.git)
</script>
