<script type="text/markdown" data-help-name="network-service-discover">
Returns the network point metadata available on this Node-RED runtime.

Wire this node on the remote/server side of a network connection. It accepts the discovery request from `network-point-discover` and preserves its `requestId` so the originating client can correlate the response.

### Properties
: Context Stores (string) : Comma-separated names of global context stores to scan, such as `default,persistent`.

### Inputs
: action (string) : Must be `discover`.
: requestId (string) : Correlation identifier from the requesting client; it is returned unchanged.

### Outputs
: action (string) : `discover`.
: requestId (string) : The original discovery request identifier.
: networkProperties (object) : Network-enabled global values grouped by context store.

### Details
The node scans the configured global context stores. A value is included when it has both `metadata` and `network` properties, as produced by `network-point-register`.

### Status
- Green (dot): Ready for discovery requests.
- Blue (dot): Discovery response sent.
- Yellow (ring): A non-discovery message was ignored.
- Red (ring): Invalid input message.
