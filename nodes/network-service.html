<script type="text/markdown" data-help-name="network-service">
Provides the server-side network API for a selected point registry. Route incoming network messages directly to this node; its `action` property selects the operation.

### Properties
: Registry (config) : The network point registry served by this node.

### Inputs
: action (string) : `read`, `write`, `discover`, or `help`.
: pointId (number) : Required by `read` and `write`.
: priority (number|string) : Required by `write`; valid values are 1 through 16 or `fallback`. The default value cannot be changed over the network.
: value (any) : Required by `write`; use `null` or `"null"` to release the selected priority or fallback.
: requestId (string) : Required for bridge-facing traffic. It is returned unchanged by all responses.

### Outputs
: read (object) : The requested point state, with a `status` object.
: write (object) : The updated point state, with a `status` object.
: discover (object) : The original request plus `networkProperties`, grouped by context store.
: help (object) : `payload` and `help` contain descriptions and examples for all supported actions.

### Details
`discover` enumerates the points registered in the selected registry, so it reports only points served by this service. The node reads the corresponding global state to return each point's network metadata.

### Status
- Green (dot): Ready or help returned.
- Blue (dot): Discovery response sent.
- Blue (ring): Read or write response sent.
- Red (ring): Invalid input, unavailable registry, or operation error.
</script>
